# Project `.env` is loaded into the container (ADMIN_SECRET, PUBLIC_BASE_URL, …).
# Compose also reads `.env` on the host for ${PORT} in the port mapping.
# Create `.env` first: `cp .env.example .env` or `python3 scripts/setup_env.py`
services:
  web:
    build: .
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
