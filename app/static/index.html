<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QRender</title>
  <link rel="icon" href="/static/logo.png" type="image/png" />
  <link rel="manifest" href="/static/manifest.json" />
  <meta name="theme-color" content="#5b8cff" />
  <style>
    :root {
      --bg: #0c0f14;
      --surface: #151a22;
      --surface2: #1c2330;
      --border: #2a3444;
      --text: #e8edf5;
      --muted: #8b98ad;
      --accent: #5b8cff;
      --accent2: #3d6fd9;
      --ok: #4ade80;
      --err: #f87171;
      --radius: 14px;
      --font: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font);
      background: radial-gradient(1200px 600px at 10% -10%, #1a2340 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
    }
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .shell-inner {
      max-width: 1080px;
      margin: 0 auto;
      padding-left: 20px;
      padding-right: 20px;
    }

    .site-header {
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      background: rgba(12, 15, 20, 0.85);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .site-header-inner {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      min-height: 56px;
      padding-top: 10px;
      padding-bottom: 10px;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      text-decoration: none;
    }
    .brand:hover {
      color: var(--accent);
    }
    .brand-mark {
      width: 40px;
      height: 40px;
      object-fit: contain;
      flex-shrink: 0;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.12);
    }
    .site-nav {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
    }
    .nav-link {
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 600;
      text-decoration: none;
      color: var(--muted);
      border: 1px solid transparent;
      cursor: pointer;
      background: transparent;
      font-family: inherit;
    }
    .nav-link:hover {
      color: var(--text);
      border-color: var(--border);
      background: rgba(255, 255, 255, 0.04);
    }
    .nav-link--accent {
      color: var(--accent);
      border-color: rgba(91, 140, 255, 0.4);
      background: rgba(91, 140, 255, 0.08);
    }
    .nav-link--accent:hover {
      border-color: var(--accent);
      background: rgba(91, 140, 255, 0.14);
    }

    .site-main {
      flex: 1;
      padding: 22px 0 36px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .github-icon-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: 1px solid var(--border);
      color: var(--muted);
      text-decoration: none;
      transition: border-color 0.15s ease, color 0.15s ease, background 0.15s ease;
    }
    .github-icon-link:hover {
      border-color: var(--muted);
      color: var(--accent);
      background: rgba(255, 255, 255, 0.04);
    }
    
    /* Toast Notification */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      z-index: 2000;
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.err { border-color: var(--err); }
    #toast.ok { border-color: var(--ok); }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      align-items: start;
    }
    @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }
    
    /* Modal Styles */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      padding: 20px;
    }
    .modal-overlay.is-open {
      opacity: 1;
      pointer-events: auto;
    }
    .modal-content {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      max-width: 800px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      padding: 30px;
    }
    .modal-close {
      position: absolute;
      top: 20px;
      right: 20px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .modal-close:hover {
      background: var(--err);
      border-color: var(--err);
      color: white;
    }
    .modal-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 24px;
      text-align: center;
    }
    .examples-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 24px;
    }
    .example-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: all 0.2s ease;
      position: relative;
    }
    .example-item img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
    }
    .row2 {
      display: flex;
      gap: 12px;
    }
    .row2 > div {
      flex: 1;
    }
    .modal-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .never-show-label {
      font-size: 0.88rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .never-show-label input {
      accent-color: var(--accent);
    }

    .card {
      background: linear-gradient(180deg, var(--surface) 0%, #121722 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 18px 16px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.35);
    }
    .card h2 {
      margin: 0 0 14px;
      font-size: 1.05rem;
      font-weight: 650;
      letter-spacing: -0.01em;
    }
    .section {
      border-top: 1px solid var(--border);
      margin-top: 14px;
      padding-top: 14px;
    }
    .section:first-of-type { border-top: none; margin-top: 0; padding-top: 0; }
    label { display: block; margin: 10px 0 6px; font-size: 0.82rem; color: #c7d2e5; }
    input[type="text"], input[type="number"], select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 0.95rem;
    }
    input[type="color"] {
      width: 100%;
      height: 40px;
      padding: 4px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface2);
      cursor: pointer;
    }
    .finder-color-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .finder-color-row input[type="color"] {
      flex: 1;
      min-width: 0;
    }
    button.finder-pick-btn {
      flex-shrink: 0;
      width: 30px;
      min-width: 30px;
      height: 30px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .file-input-hidden {
      position: absolute !important;
      width: 1px !important;
      height: 1px !important;
      padding: 0 !important;
      margin: -1px !important;
      overflow: hidden !important;
      clip: rect(0, 0, 0, 0) !important;
      white-space: nowrap !important;
      border: 0 !important;
    }
    .file-picker-zone {
      margin-top: 8px;
      padding: 18px 16px;
      border-radius: 12px;
      border: 1px dashed rgba(91, 140, 255, 0.35);
      background: rgba(0, 0, 0, 0.18);
      transition: border-color 0.15s ease, background 0.15s ease;
    }
    .file-picker-zone:hover {
      border-color: rgba(91, 140, 255, 0.55);
      background: rgba(91, 140, 255, 0.06);
    }
    .file-picker-zone.is-drag {
      border-color: var(--accent);
      background: rgba(91, 140, 255, 0.1);
    }
    .file-picker-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      text-align: center;
    }
    .file-picker-title {
      font-size: 0.92rem;
      font-weight: 650;
      color: var(--text);
    }
    .file-picker-hint {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.4;
    }
    .file-picker-status {
      margin: 14px 0 0;
      font-size: 0.82rem;
      color: var(--muted);
      word-break: break-all;
      text-align: center;
      line-height: 1.35;
    }
    .file-picker-status.has-file {
      color: #c7d2e5;
      font-weight: 500;
    }
    input[type="range"] {
      width: 100%;
      margin: 4px 0 12px;
      accent-color: var(--accent);
    }
    .range-val { color: var(--accent); font-weight: 600; }
    .framing-editor-wrap {
      margin-top: 10px;
      max-width: 340px;
    }
    .framing-editor-wrap.hidden { display: none !important; }
    .crop-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      overflow: hidden;
      border-radius: 8px;
      border: none;
      background: #4a4d54;
      touch-action: none;
      cursor: grab;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.35);
    }
    .crop-frame:active { cursor: grabbing; }
    .crop-frame.is-picking-color {
      cursor: crosshair;
      outline: 2px solid var(--accent);
      outline-offset: 0;
    }
    .crop-frame img {
      position: absolute;
      left: 0;
      top: 0;
      max-width: none;
      user-select: none;
      pointer-events: none;
    }
    .crop-circle-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }
    .crop-circle-overlay::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 86%;
      aspect-ratio: 1;
      border-radius: 4px;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.58);
      border: 2px solid rgba(255, 255, 255, 0.92);
      box-sizing: border-box;
    }
    .short-link-bundle {
      margin-top: 12px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.12);
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .short-link-bundle.is-on {
      border-color: rgba(91, 140, 255, 0.38);
      box-shadow: 0 0 0 1px rgba(91, 140, 255, 0.06);
    }
    .short-link-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .short-link-check {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0;
      flex-shrink: 0;
      cursor: pointer;
      font-size: 0.88rem;
      color: #dbe4f5;
    }
    .short-link-check input {
      width: auto;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .short-url-field-wrap {
      display: flex;
      align-items: stretch;
      gap: 8px;
      flex: 1;
      min-width: min(100%, 200px);
    }
    .short-url-field {
      flex: 1;
      min-width: 0;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 0.8rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
    .short-url-copy {
      flex-shrink: 0;
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-weight: 550;
      font-size: 0.82rem;
      cursor: pointer;
    }
    .short-url-copy:disabled {
      opacity: 0.42;
      cursor: not-allowed;
    }
    .short-url-copy:not(:disabled):hover {
      border-color: rgba(91, 140, 255, 0.45);
      color: var(--accent);
    }
    @media (max-width: 520px) {
      .short-link-row { align-items: stretch; }
      .short-link-check { width: 100%; }
      .short-url-field-wrap { width: 100%; }
    }
    .publish-before-generate {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }
    .card-head {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 14px;
    }
    .card-head h2 { margin: 0; }
    .card-sub {
      margin: 0;
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 400;
    }
    .preview-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 16px;
      color: var(--muted);
      font-size: 0.88rem;
    }
    .preview-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: qrender-spin 0.65s linear infinite;
    }
    @keyframes qrender-spin {
      to { transform: rotate(360deg); }
    }
    .actions { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
    .toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface2);
    }
    .toggle input { width: auto; accent-color: var(--accent); }
    .toggle span { font-size: 0.88rem; color: #dbe4f5; }
    button.primary {
      flex: 1;
      min-width: 140px;
      padding: 12px 16px;
      border: none;
      border-radius: 11px;
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent2) 100%);
      color: white;
      font-weight: 650;
      cursor: pointer;
      font-size: 0.95rem;
    }
    button.primary:disabled { opacity: 0.45; cursor: not-allowed; }
    button.ghost {
      padding: 12px 16px;
      border-radius: 11px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font-weight: 550;
    }
    button.ghost:disabled {
      opacity: 0.42;
      cursor: not-allowed;
    }
    .status {
      margin-top: 10px;
      font-size: 0.8rem;
      color: var(--muted);
      min-height: 1.2em;
    }
    .status.live { color: var(--ok); }
    .error { color: var(--err); font-size: 0.85rem; margin-top: 10px; white-space: pre-wrap; }
    .preview-wrap {
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: repeating-conic-gradient(#121722 0% 25%, #0f141c 0% 50%) 50% / 24px 24px;
      min-height: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .preview-wrap img {
      max-width: 100%;
      border-radius: 12px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.45);
    }
    .preview-placeholder { color: var(--muted); font-size: 0.9rem; text-align: center; padding: 24px; }
    
    .history-section { margin-top: 30px; border-top: 1px solid var(--border); padding-top: 20px; }
    .history-title { font-size: 1rem; font-weight: 700; margin-bottom: 12px; }
    .history-list { display: flex; flex-direction: column; gap: 8px; }
    .history-item { 
      background: var(--surface2); 
      padding: 10px 14px; 
      border-radius: 10px; 
      font-size: 0.82rem; 
      display: flex; 
      justify-content: space-between; 
      align-items: center;
    }
    .history-link { color: var(--accent); text-decoration: none; word-break: break-all; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="page">
    <header class="site-header">
      <div class="shell-inner site-header-inner">
        <a class="brand" href="/">
          <img class="brand-mark" src="/static/logo.png" width="40" height="40" alt="" decoding="async" />
          <span>QRender</span>
        </a>
        <nav class="site-nav" aria-label="Primary">
          <button type="button" class="nav-link" id="showExamplesBtn">Examples</button>
          {{GITHUB_LINK}}
          <a class="nav-link nav-link--accent" href="/admin">Admin</a>
        </nav>
      </div>
    </header>

    <main class="site-main" id="main">
      <div class="shell-inner">
        <div class="layout">
          <div class="card">
            <div class="section">
              <label for="content">Link or text</label>
              <input id="content" type="text" placeholder="https://example.com" autocomplete="url" />
              <div id="shortLinkBundle" class="short-link-bundle">
                <div class="short-link-row">
                  <label class="short-link-check" for="use_short_url">
                    <input type="checkbox" id="use_short_url" />
                    <span>Short link</span>
                  </label>
                  <div class="short-url-field-wrap">
                    <input type="text" id="shortUrlDisplay" class="short-url-field" readonly placeholder="Generate to get link" />
                    <button type="button" class="short-url-copy" id="copyShortUrlBtn" disabled>Copy</button>
                  </div>
                </div>
              </div>
            </div>

            <div class="section">
              <div style="display:flex; justify-content:space-between; align-items:baseline;">
                <label>Background image</label>
              </div>
              <div class="file-picker-zone" id="imageDropzone">
                <input id="image" class="file-input-hidden" type="file" accept="image/*" />
                <label for="image" class="file-picker-card">
                  <span class="file-picker-title">Choose image</span>
                  <span class="file-picker-hint">Click here or drag &amp; drop</span>
                </label>
                <p id="imageFileStatus" class="file-picker-status">No file selected</p>
              </div>

              <input type="hidden" id="crop_anchor_x" value="50" />
              <input type="hidden" id="crop_anchor_y" value="50" />
              <div id="framingEditorWrap" class="framing-editor-wrap hidden">
                <label>Pan &amp; zoom</label>
                <div class="crop-frame" id="cropFrame">
                  <img id="cropImg" alt="" />
                  <div class="crop-circle-overlay"></div>
                </div>
                <div class="zoom-toolbar">
                  <input type="range" id="cover_zoom" min="25" max="300" value="50" step="5" />
                </div>
              </div>

              <label for="micro_dot_radius_pct">Dot radius <span class="range-val" id="dotSizeLabel">22%</span></label>
              <input type="range" id="micro_dot_radius_pct" min="8" max="35" value="22" />

              <label for="finder_shape">Finder shape</label>
              <select id="finder_shape">
                <option value="square" selected>Square</option>
                <option value="circle">Circle</option>
              </select>
              
              <div class="row2" style="margin-top:10px">
                <div>
                  <label for="finder_dark_color">Finder dark</label>
                  <input id="finder_dark_color" type="color" value="#000000" />
                </div>
                <div>
                  <label for="finder_light_color">Finder light</label>
                  <input id="finder_light_color" type="color" value="#ffffff" />
                </div>
              </div>

              <label for="photo_wash">Background Brightness (Contrast)</label>
              <input type="range" id="photo_wash" min="-0.6" max="0.6" value="0" step="0.05" />
              <p class="muted">Increase for better scannability on dark photos.</p>
            </div>

            <div class="toggle">
              <input type="checkbox" id="livePreview" checked />
              <span>Live preview</span>
            </div>

            <div class="publish-before-generate">
              <div class="toggle">
                <input type="checkbox" id="save_to_admin" disabled />
                <span>Save — Manage in Admin</span>
              </div>
            </div>

            <div class="actions">
              <button type="button" class="primary" id="generateBtn">Generate</button>
              <button type="button" class="ghost" id="downloadBtn" disabled>Download PNG</button>
              <button type="button" class="ghost hidden" id="shareBtn">Share</button>
              <button type="button" class="ghost" id="resetBtn">Reset</button>
            </div>
            <div id="error" class="error"></div>

            <div id="historySection" class="history-section hidden">
              <h4 class="history-title">Recent Links</h4>
              <div id="historyList" class="history-list"></div>
            </div>
          </div>

          <div class="card">
            <div class="card-head">
              <h2>Preview</h2>
              <div id="status" class="status"></div>
            </div>
            <div class="preview-wrap" id="preview">
              <div class="preview-placeholder">Choose a photo to begin</div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="examplesModal">
    <div class="modal-content">
      <button type="button" class="modal-close" id="closeModalBtn">&times;</button>
      <h3 class="modal-title">Micro-dot Style Examples</h3>
      <div class="examples-grid">
        <div class="example-item">
          <img src="/static/images/demo_microdot_1.png" alt="Ex 1" />
        </div>
        <div class="example-item">
          <img src="/static/images/demo_microdot_2.png" alt="Ex 2" />
        </div>
        <div class="example-item">
          <img src="/static/images/demo_microdot_3.png" alt="Ex 3" />
        </div>
      </div>
      <div class="modal-footer">
        <label class="never-show-label">
          <input type="checkbox" id="neverShowAgain" />
          <span>Don't show this again on startup</span>
        </label>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    const contentEl = document.getElementById("content");
    const useShortUrlEl = document.getElementById("use_short_url");
    const saveToAdminEl = document.getElementById("save_to_admin");
    const shortUrlDisplay = document.getElementById("shortUrlDisplay");
    const copyShortUrlBtn = document.getElementById("copyShortUrlBtn");
    const imageEl = document.getElementById("image");
    const microDotRadiusPctEl = document.getElementById("micro_dot_radius_pct");
    const dotSizeLabel = document.getElementById("dotSizeLabel");
    const finderShapeEl = document.getElementById("finder_shape");
    const finderDarkColorEl = document.getElementById("finder_dark_color");
    const finderLightColorEl = document.getElementById("finder_light_color");
    const photoWashEl = document.getElementById("photo_wash");
    const generateBtn = document.getElementById("generateBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const resetBtn = document.getElementById("resetBtn");
    const shareBtn = document.getElementById("shareBtn");
    const previewEl = document.getElementById("preview");
    const errorEl = document.getElementById("error");
    const statusEl = document.getElementById("status");
    const toast = document.getElementById("toast");
    const historySection = document.getElementById("historySection");
    const historyList = document.getElementById("historyList");
    const examplesModal = document.getElementById("examplesModal");
    const neverShowAgainCheckbox = document.getElementById("neverShowAgain");
    const cropAnchorXEl = document.getElementById("crop_anchor_x");
    const cropAnchorYEl = document.getElementById("crop_anchor_y");
    const framingEditorWrap = document.getElementById("framingEditorWrap");
    const cropFrame = document.getElementById("cropFrame");
    const cropImg = document.getElementById("cropImg");
    const coverZoomEl = document.getElementById("cover_zoom");
    const livePreviewEl = document.getElementById("livePreview");

    let currentBlobUrl = null;
    let currentBlob = null;
    let debounceTimer = null;
    let inFlight = false;
    let cropImgUrl = null;
    const cropState = { iw: 0, ih: 0, ox: 0, oy: 0, zoom: 1, cw: 280, W: 0, H: 0 };
    let framingDrag = null;

    function showToast(msg, type = 'ok') {
      toast.textContent = msg;
      toast.className = 'show ' + type;
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
    function clamp01(v) { return clamp(v, 0, 1); }

    function syncDotSizeLabel() { dotSizeLabel.textContent = microDotRadiusPctEl.value + "%"; }

    function updateHistory(url) {
      let history = JSON.parse(localStorage.getItem("qrender_history") || "[]");
      if (!history.includes(url)) {
        history.unshift(url);
        history = history.slice(0, 5);
        localStorage.setItem("qrender_history", JSON.stringify(history));
      }
      renderHistory();
    }

    function renderHistory() {
      const history = JSON.parse(localStorage.getItem("qrender_history") || "[]");
      if (history.length === 0) return;
      historySection.classList.remove("hidden");
      historyList.innerHTML = history.map(url => `
        <div class="history-item">
          <a href="${url}" target="_blank" class="history-link">${url}</a>
          <button class="btn btn-mini" onclick="navigator.clipboard.writeText('${url}'); showToast('Copied!')">Copy</button>
        </div>
      `).join("");
    }

    function clampPan() {
      const cw = cropState.cw, W = cropState.W, H = cropState.H;
      if (W >= cw) cropState.ox = Math.min(0, Math.max(cw - W, cropState.ox));
      else cropState.ox = Math.min(cw - W, Math.max(0, cropState.ox));
      if (H >= cw) cropState.oy = Math.min(0, Math.max(cw - H, cropState.oy));
      else cropState.oy = Math.min(cw - H, Math.max(0, cropState.oy));
    }

    function syncAnchorsFromFraming() {
      const cw = cropState.cw, W = cropState.W, H = cropState.H, ox = cropState.ox, oy = cropState.oy;
      let ax, ay;
      if (W >= cw) { const lx = Math.max(0, W - cw); ax = lx > 1e-6 ? (-ox) / lx : 0.5; }
      else { const lx = Math.max(0, cw - W); ax = lx > 1e-6 ? ox / lx : 0.5; }
      if (H >= cw) { const ly = Math.max(0, H - cw); ay = ly > 1e-6 ? (-oy) / ly : 0.5; }
      else { const ly = Math.max(0, cw - H); ay = ly > 1e-6 ? oy / ly : 0.5; }
      cropAnchorXEl.value = String(Math.round(clamp01(ax) * 100));
      cropAnchorYEl.value = String(Math.round(clamp01(ay) * 100));
    }

    function layoutFramingEditor(resetCenter) {
      if (!cropState.iw || !cropState.ih) return;
      const cw = cropFrame.clientWidth || 280;
      const cw0 = cropState.cw, W0 = cropState.W, H0 = cropState.H, ox0 = cropState.ox, oy0 = cropState.oy;
      cropState.zoom = Number(coverZoomEl.value) / 100;
      const S = Math.max(cw / cropState.iw, cw / cropState.ih) * cropState.zoom;
      const W = cropState.iw * S, H = cropState.ih * S;
      cropState.cw = cw; cropState.W = W; cropState.H = H;
      
      if (resetCenter) {
        cropState.ox = (cw - W) / 2; cropState.oy = (cw - H) / 2;
      } else if (W0 > 1e-6 && H0 > 1e-6 && cw0 > 0) {
        const u = (cw0 / 2 - ox0) / W0, v = (cw0 / 2 - oy0) / H0;
        cropState.ox = cw / 2 - u * W; cropState.oy = cw / 2 - v * H;
      } else {
        cropState.ox = (cw - W) / 2; cropState.oy = (cw - H) / 2;
      }
      clampPan();
      cropImg.style.width = W + "px"; cropImg.style.height = H + "px";
      cropImg.style.left = cropState.ox + "px"; cropImg.style.top = cropState.oy + "px";
      syncAnchorsFromFraming();
    }

    function initFramingFromImage() {
      const file = imageEl.files && imageEl.files[0];
      if (!file) {
        framingEditorWrap.classList.add("hidden");
        cropState.iw = 0; cropState.ih = 0;
        return;
      }
      framingEditorWrap.classList.remove("hidden");
      if (cropImgUrl) URL.revokeObjectURL(cropImgUrl);
      cropImgUrl = URL.createObjectURL(file);
      cropImg.src = cropImgUrl;
      const im = new Image();
      im.onload = () => {
        cropState.iw = im.naturalWidth; cropState.ih = im.naturalHeight;
        requestAnimationFrame(() => layoutFramingEditor(true));
      };
      im.src = cropImgUrl;
    }

    new ResizeObserver(() => { if (cropState.iw) layoutFramingEditor(false); }).observe(cropFrame);

    async function generateNow(reason) {
      errorEl.textContent = "";
      if (!imageEl.files[0] || !contentEl.value.trim()) {
        if (reason === "manual") showToast("Image and link required", "err");
        return;
      }
      
      previewEl.innerHTML = '<div class="preview-loading"><div class="preview-spinner"></div><span>Rendering...</span></div>';
      generateBtn.disabled = true;
      downloadBtn.disabled = true;
      shareBtn.classList.add("hidden");
      
      try {
        const form = new FormData();
        form.append("content", contentEl.value);
        form.append("box_size", "12");
        form.append("border", "2");
        form.append("crop_anchor_x", (Number(cropAnchorXEl.value) / 100).toFixed(4));
        form.append("crop_anchor_y", (Number(cropAnchorYEl.value) / 100).toFixed(4));
        form.append("fit_mode", "cover");
        form.append("cover_zoom", (Number(coverZoomEl.value) / 100).toFixed(2));
        form.append("micro_dot_radius_frac", (microDotRadiusPctEl.value / 100).toFixed(2));
        form.append("finder_shape", finderShapeEl.value);
        form.append("finder_dark_color", finderDarkColorEl.value);
        form.append("finder_light_color", finderLightColorEl.value);
        form.append("photo_wash", photoWashEl.value);
        form.append("use_short_url", useShortUrlEl.checked ? "1" : "0");
        form.append("save_to_admin", saveToAdminEl.checked ? "1" : "0");
        form.append("image", imageEl.files[0]);

        const resp = await fetch("/qr/art", { method: "POST", body: form });
        if (!resp.ok) {
          const payload = await resp.json().catch(() => ({}));
          throw new Error(payload.detail || ("HTTP " + resp.status));
        }
        
        const enc = resp.headers.get("X-QR-Encoded-Content");
        if (useShortUrlEl.checked && enc) {
          shortUrlDisplay.value = enc.trim();
          updateHistory(enc.trim());
          copyShortUrlBtn.disabled = false;
        } else {
          shortUrlDisplay.value = "";
          copyShortUrlBtn.disabled = true;
        }

        const blob = await resp.blob();
        currentBlob = blob;
        if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
        currentBlobUrl = URL.createObjectURL(blob);
        previewEl.innerHTML = `<img src="${currentBlobUrl}" alt="QR">`;
        downloadBtn.disabled = false;
        
        if (navigator.share && navigator.canShare && navigator.canShare({ files: [new File([blob], 'qr.png', {type: 'image/png'})] })) {
          shareBtn.classList.remove("hidden");
        }

        statusEl.textContent = (livePreviewEl.checked ? "Live: " : "") + (reason || "OK");
        statusEl.className = "status live";
        if (reason === "manual") showToast("QR Generated!");
      } catch (e) {
        errorEl.textContent = e.message;
        previewEl.innerHTML = '<div class="preview-placeholder">Failed to render</div>';
        statusEl.textContent = "";
        statusEl.className = "status";
        if (reason === "manual") showToast(e.message, "err");
      } finally {
        generateBtn.disabled = false;
      }
    }

    function scheduleGenerate(reason) {
      if (!livePreviewEl.checked && reason !== "manual") return;
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        if (inFlight) return;
        inFlight = true;
        generateNow(reason).finally(() => { inFlight = false; });
      }, reason === "manual" ? 0 : 420);
    }

    // Modal Logic
    function openModal() {
      neverShowAgainCheckbox.checked = localStorage.getItem("qrender_hide_examples") === "true";
      examplesModal.classList.add("is-open");
    }
    function closeModal() {
      examplesModal.classList.remove("is-open");
      if (neverShowAgainCheckbox.checked) localStorage.setItem("qrender_hide_examples", "true");
      else localStorage.removeItem("qrender_hide_examples");
    }

    document.getElementById("showExamplesBtn").addEventListener("click", openModal);
    document.getElementById("closeModalBtn").addEventListener("click", closeModal);
    examplesModal.addEventListener("click", (e) => { if (e.target === examplesModal) closeModal(); });

    // Event Listeners for UI
    useShortUrlEl.addEventListener("change", () => {
      saveToAdminEl.disabled = !useShortUrlEl.checked;
      if (!useShortUrlEl.checked) saveToAdminEl.checked = false;
      scheduleGenerate("short");
    });

    copyShortUrlBtn.addEventListener("click", () => {
      navigator.clipboard.writeText(shortUrlDisplay.value).then(() => showToast("Link copied!"));
    });

    downloadBtn.addEventListener("click", () => {
      const a = document.createElement("a");
      a.href = currentBlobUrl;
      a.download = "qrender-art.png";
      a.click();
    });

    shareBtn.addEventListener("click", async () => {
      if (!currentBlob) return;
      try {
        const file = new File([currentBlob], 'qrender-art.png', { type: 'image/png' });
        await navigator.share({ title: 'My QRender Art', files: [file] });
      } catch (err) {
        console.error("Share failed", err);
      }
    });

    resetBtn.addEventListener("click", () => location.reload());
    
    imageEl.addEventListener("change", () => {
      document.getElementById("imageFileStatus").textContent = imageEl.files[0]?.name || "No file";
      initFramingFromImage();
      generateBtn.disabled = false;
      scheduleGenerate("image");
    });

    // Event listeners for Live Preview triggers
    microDotRadiusPctEl.addEventListener("input", () => { syncDotSizeLabel(); scheduleGenerate("dots"); });
    coverZoomEl.addEventListener("input", () => { layoutFramingEditor(false); scheduleGenerate("zoom"); });
    
    ["input", "change"].forEach((evt) => {
      contentEl.addEventListener(evt, () => scheduleGenerate("content"));
      finderShapeEl.addEventListener(evt, () => scheduleGenerate("finder"));
      finderDarkColorEl.addEventListener(evt, () => scheduleGenerate("finder"));
      finderLightColorEl.addEventListener(evt, () => scheduleGenerate("finder"));
      photoWashEl.addEventListener(evt, () => scheduleGenerate("wash"));
    });

    livePreviewEl.addEventListener("change", () => {
      if (livePreviewEl.checked) scheduleGenerate("live on");
    });

    generateBtn.addEventListener("click", () => generateNow("manual"));

    // Pan/Zoom Dragging
    cropFrame.addEventListener("pointerdown", (e) => {
      framingDrag = { px: e.clientX, py: e.clientY, ox: cropState.ox, oy: cropState.oy };
      cropFrame.setPointerCapture(e.pointerId);
    });
    cropFrame.addEventListener("pointermove", (e) => {
      if (!framingDrag) return;
      cropState.ox = framingDrag.ox + (e.clientX - framingDrag.px);
      cropState.oy = framingDrag.oy + (e.clientY - framingDrag.py);
      clampPan();
      cropImg.style.left = cropState.ox + "px";
      cropImg.style.top = cropState.oy + "px";
      syncAnchorsFromFraming();
      scheduleGenerate("framing");
    });
    cropFrame.addEventListener("pointerup", () => { framingDrag = null; });
    cropFrame.addEventListener("pointercancel", () => { framingDrag = null; });
    cropFrame.addEventListener("wheel", (e) => {
      e.preventDefault();
      const z = Number(coverZoomEl.value);
      coverZoomEl.value = String(clamp(z + (e.deltaY > 0 ? -5 : 5), 25, 300));
      layoutFramingEditor(false);
      scheduleGenerate("zoom");
    }, { passive: false });

    window.addEventListener("DOMContentLoaded", () => {
      renderHistory();
      if (localStorage.getItem("qrender_hide_examples") !== "true") setTimeout(openModal, 600);
    });

    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/static/sw.js').catch(err => {
          console.error('SW registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
