<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin · QRender</title>
  <link rel="icon" href="/static/logo.png" type="image/png" />
  <style>
    :root {
      --bg: #0c0f14;
      --surface: #151a22;
      --surface2: #1c2330;
      --border: #2a3444;
      --text: #e8edf5;
      --muted: #8b98ad;
      --accent: #5b8cff;
      --accent2: #3d6fd9;
      --ok: #4ade80;
      --err: #f87171;
      --radius: 14px;
      --font: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font);
      background: radial-gradient(1200px 600px at 10% -10%, #1a2340 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
    }
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .shell-inner {
      max-width: 1080px;
      margin: 0 auto;
      padding-left: 20px;
      padding-right: 20px;
    }
    .site-header {
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      background: rgba(12, 15, 20, 0.85);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .site-header-inner {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      min-height: 56px;
      padding-top: 10px;
      padding-bottom: 10px;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      text-decoration: none;
    }
    .brand:hover { color: var(--accent); }
    .brand-mark {
      width: 40px;
      height: 40px;
      object-fit: contain;
      flex-shrink: 0;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.12);
    }
    .site-nav {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
    }
    .nav-link {
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 600;
      text-decoration: none;
      color: var(--muted);
      border: 1px solid transparent;
    }
    .nav-link:hover {
      color: var(--text);
      border-color: var(--border);
      background: rgba(255, 255, 255, 0.04);
    }
    .nav-link--current {
      color: var(--accent);
      border-color: rgba(91, 140, 255, 0.4);
      background: rgba(91, 140, 255, 0.08);
      cursor: default;
      pointer-events: none;
    }
    .nav-link--accent {
      color: var(--accent);
      border-color: rgba(91, 140, 255, 0.4);
      background: rgba(91, 140, 255, 0.08);
    }
    .nav-link--accent:hover {
      border-color: var(--accent);
      background: rgba(91, 140, 255, 0.14);
    }
    button.nav-link {
      cursor: pointer;
      font: inherit;
      font-family: inherit;
    }
    .site-main {
      flex: 1;
      padding: 20px 0 36px;
    }
    .hidden { display: none !important; }

    /* Toast Notification */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      z-index: 2000;
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.err { border-color: var(--err); }
    #toast.ok { border-color: var(--ok); }

    /* Login */
    .login-wrap {
      max-width: 420px;
      margin: 28px auto 0;
    }
    .login-card {
      background: linear-gradient(180deg, var(--surface) 0%, #121722 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 24px 26px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.45);
    }
    .login-card h1 {
      margin: 0 0 6px;
      font-size: 1.35rem;
      letter-spacing: -0.02em;
    }
    .login-card label { display: block; font-size: 0.82rem; color: #c7d2e5; margin-bottom: 8px; }
    .login-card input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border-radius: 11px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 1rem;
    }
    .login-actions { margin-top: 18px; display: flex; flex-direction: column; gap: 12px; }
    .login-actions button.primary {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 11px;
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent2) 100%);
      color: white;
      font-weight: 650;
      font-size: 0.98rem;
      cursor: pointer;
    }
    .login-actions button.primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .remember {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.88rem;
      color: #dbe4f5;
      cursor: pointer;
    }
    .remember input { accent-color: var(--accent); width: auto; }

    .btn {
      padding: 9px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font-weight: 550;
      font-size: 0.88rem;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn:hover { border-color: #3d4d63; background: rgba(255,255,255,0.04); }
    .btn-primary {
      border: none;
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent2) 100%);
      color: white;
    }
    .btn-primary:hover { filter: brightness(1.06); }

    .card {
      background: linear-gradient(180deg, var(--surface) 0%, #121722 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.25);
    }
    .card-toolbar { 
      display: flex; 
      flex-wrap: wrap; 
      gap: 12px; 
      align-items: center; 
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .search-input-wrap {
      flex: 1;
      min-width: 200px;
      position: relative;
    }
    .search-input {
      width: 100%;
      padding: 10px 14px 10px 36px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 0.88rem;
    }
    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
    th, td {
      text-align: left;
      padding: 12px 10px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    th {
      color: var(--muted);
      font-weight: 600;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      background: rgba(0,0,0,0.15);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    tr:hover td { background: rgba(91, 140, 255, 0.04); }
    td input.edit-target {
      width: 100%;
      padding: 8px 10px;
      border-radius: 9px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 0.84rem;
    }
    td input.edit-target:read-only {
      background: rgba(0, 0, 0, 0.12);
      border-color: transparent;
      cursor: default;
    }
    .stats { color: var(--muted); font-size: 0.8rem; white-space: nowrap; }

    .qr-cell { width: 100px; }
    .qr-cell img.qr-preview-img {
      display: block;
      border-radius: 8px;
      background: #fff;
      padding: 4px;
      width: 80px;
      height: 80px;
      object-fit: contain;
    }
    .btn-mini {
      padding: 4px 8px;
      font-size: 0.72rem;
      border-radius: 6px;
    }
    .actions-cell { white-space: nowrap; }
    .actions-cell .btn { padding: 6px 10px; font-size: 0.78rem; margin-right: 4px; }
    .table-scroll { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); max-height: 70vh; overflow-y: auto; }
  </style>
</head>
<body>
  <div class="page">
    <header class="site-header">
      <div class="shell-inner site-header-inner">
        <a class="brand" href="/">
          <img class="brand-mark" src="/static/logo.png" width="40" height="40" alt="" decoding="async" />
          <span>QRender</span>
        </a>
        <nav class="site-nav" aria-label="Primary">
          <a class="nav-link" href="/">Generator</a>
          <span class="nav-link nav-link--current">Admin</span>
          <button type="button" class="nav-link nav-link--accent hidden" id="headerSignOut">Sign out</button>
        </nav>
      </div>
    </header>

    <main class="site-main">
      <div id="loginScreen" class="login-wrap">
        <div class="login-card">
          <h1>Admin sign-in</h1>
          <label for="loginPassword">Password</label>
          <input id="loginPassword" type="password" autocomplete="current-password" placeholder="Admin password" />
          <div class="login-actions">
            <label class="remember">
              <input type="checkbox" id="rememberMe" />
              <span>Remember me</span>
            </label>
            <button type="button" class="primary" id="loginBtn">Sign in</button>
          </div>
        </div>
      </div>

      <div id="adminDashboard" class="hidden">
        <div class="shell-inner">
          <div class="card">
            <div class="card-toolbar">
              <div class="search-input-wrap">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                <input type="text" id="searchInput" class="search-input" placeholder="Search destinations..." />
              </div>
              <button type="button" class="btn btn-primary" id="reloadBtn">Reload</button>
              <button type="button" class="btn" id="exportBtn">Export CSV</button>
            </div>
            <div class="table-scroll">
              <table>
                <thead>
                  <tr>
                    <th>QR Preview</th>
                    <th>Code</th>
                    <th>Destination</th>
                    <th>Hits</th>
                    <th>Last scan</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="tbody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="toast"></div>

  <script>
    const STORAGE_SESSION = "qrender_admin_session";
    const STORAGE_PERSIST = "qrender_admin_token";

    const loginScreen = document.getElementById("loginScreen");
    const adminDashboard = document.getElementById("adminDashboard");
    const loginPassword = document.getElementById("loginPassword");
    const rememberMe = document.getElementById("rememberMe");
    const loginBtn = document.getElementById("loginBtn");
    const headerSignOut = document.getElementById("headerSignOut");
    const tbody = document.getElementById("tbody");
    const reloadBtn = document.getElementById("reloadBtn");
    const searchInput = document.getElementById("searchInput");
    const exportBtn = document.getElementById("exportBtn");
    const toast = document.getElementById("toast");

    let allLinks = [];
    let publicBaseUrl = "";

    function showToast(msg, type = 'ok') {
      toast.textContent = msg;
      toast.className = 'show ' + type;
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function getToken() {
      return (sessionStorage.getItem(STORAGE_SESSION) || localStorage.getItem(STORAGE_PERSIST) || "").trim();
    }

    function showLogin() {
      loginScreen.classList.remove("hidden");
      adminDashboard.classList.add("hidden");
      headerSignOut.classList.add("hidden");
      loginPassword.value = "";
    }

    function showDashboard() {
      loginScreen.classList.add("hidden");
      adminDashboard.classList.remove("hidden");
      headerSignOut.classList.remove("hidden");
    }

    async function api(path, opts) {
      const tok = getToken();
      const headers = Object.assign({ "X-Admin-Token": tok }, opts && opts.headers);
      const r = await fetch(path, Object.assign({}, opts, { headers }));
      if (r.status === 403) {
        sessionStorage.removeItem(STORAGE_SESSION);
        localStorage.removeItem(STORAGE_PERSIST);
        showLogin();
        throw new Error("Session expired. Please sign in again.");
      }
      const data = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(data.detail || "Error");
      return data;
    }

    loginBtn.addEventListener("click", async () => {
      const pwd = loginPassword.value.trim();
      if (!pwd) return showToast("Enter password", "err");
      loginBtn.disabled = true;
      try {
        const cfg = await api("/api/admin/config", { headers: { "X-Admin-Token": pwd } });
        publicBaseUrl = cfg.public_base_url || "";
        if (rememberMe.checked) localStorage.setItem(STORAGE_PERSIST, pwd);
        else sessionStorage.setItem(STORAGE_SESSION, pwd);
        showDashboard();
        loadList();
      } catch (e) {
        showToast(e.message, "err");
      } finally {
        loginBtn.disabled = false;
      }
    });

    headerSignOut.addEventListener("click", () => {
      sessionStorage.removeItem(STORAGE_SESSION);
      localStorage.removeItem(STORAGE_PERSIST);
      showLogin();
      showToast("Signed out");
    });

    function renderTable(links) {
      tbody.innerHTML = "";
      const tok = getToken();
      links.forEach(l => {
        const tr = document.createElement("tr");
        const qrUrl = `/api/admin/links/${l.code}/art.png?t=${encodeURIComponent(tok)}`;
        const fallbackUrl = `/api/admin/links/${l.code}/qr.png?t=${encodeURIComponent(tok)}`;
        
        tr.innerHTML = `
          <td class="qr-cell"><img class="qr-preview-img" alt="QR" src="${qrUrl}" onerror="if(!this.dataset.tried){this.dataset.tried=1;this.src='${fallbackUrl}'}"></td>
          <td><code>${l.code}</code></td>
          <td><input type="text" class="edit-target" value="${l.target}" readOnly data-code="${l.code}"></td>
          <td class="stats">${l.hit_count || 0}</td>
          <td class="stats">${l.last_hit_at ? new Date(l.last_hit_at * 1000).toLocaleString() : '—'}</td>
          <td class="actions-cell">
            <button class="btn btn-mini copy-btn">Copy URL</button>
            <button class="btn btn-mini edit-btn">Edit</button>
            <button class="btn btn-mini save-btn hidden btn-primary">Save</button>
            <button class="btn btn-mini del-btn">Del</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    async function loadList() {
      try {
        allLinks = await api("/api/admin/links");
        renderTable(allLinks);
      } catch (e) {
        showToast(e.message, "err");
      }
    }

    searchInput.addEventListener("input", (e) => {
      const q = e.target.value.toLowerCase();
      const filtered = allLinks.filter(l => l.code.toLowerCase().includes(q) || l.target.toLowerCase().includes(q));
      renderTable(filtered);
    });

    exportBtn.addEventListener("click", () => {
      const csv = "Code,Target,Hits,Last Scan\n" + allLinks.map(l => `${l.code},${l.target},${l.hit_count},"${l.last_hit_at ? new Date(l.last_hit_at * 1000).toISOString() : ''}"`).join("\n");
      const blob = new Blob([csv], { type: 'text/csv' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `qrender_links_${Date.now()}.csv`;
      a.click();
    });

    tbody.addEventListener("click", async (e) => {
      const tr = e.target.closest("tr");
      if (!tr) return;
      const inp = tr.querySelector(".edit-target");
      const code = inp.dataset.code;

      if (e.target.classList.contains("copy-btn")) {
        const shortUrl = `${publicBaseUrl}/s/${code}`;
        navigator.clipboard.writeText(shortUrl).then(() => showToast("Short URL copied!"));
      } else if (e.target.classList.contains("edit-btn")) {
        inp.readOnly = false;
        inp.focus();
        e.target.classList.add("hidden");
        tr.querySelector(".save-btn").classList.remove("hidden");
      } else if (e.target.classList.contains("save-btn")) {
        try {
          await api(`/api/admin/links/${code}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ target: inp.value.trim() })
          });
          showToast("Updated " + code);
          loadList();
        } catch (err) { showToast(err.message, "err"); }
      } else if (e.target.classList.contains("del-btn")) {
        if (!confirm("Delete link?")) return;
        try {
          await api(`/api/admin/links/${code}`, { method: "DELETE" });
          showToast("Deleted " + code);
          loadList();
        } catch (err) { showToast(err.message, "err"); }
      }
    });

    reloadBtn.addEventListener("click", loadList);
    loginPassword.addEventListener("keydown", e => e.key === "Enter" && loginBtn.click());

    if (getToken()) { 
      showDashboard(); 
      api("/api/admin/config").then(cfg => {
        publicBaseUrl = cfg.public_base_url || "";
        loadList();
      });
    } else showLogin();
  </script>
</body>
</html>
