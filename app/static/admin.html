<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin · QRender</title>
  <style>
    :root {
      --bg: #0c0f14;
      --surface: #151a22;
      --surface2: #1c2330;
      --border: #2a3444;
      --text: #e8edf5;
      --muted: #8b98ad;
      --accent: #5b8cff;
      --accent2: #3d6fd9;
      --ok: #4ade80;
      --err: #f87171;
      --radius: 14px;
      --font: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font);
      background: radial-gradient(1200px 600px at 10% -10%, #1a2340 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
    }
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .shell-inner {
      max-width: 1080px;
      margin: 0 auto;
      padding-left: 20px;
      padding-right: 20px;
    }
    .site-header {
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      background: rgba(12, 15, 20, 0.85);
      backdrop-filter: blur(10px);
    }
    .site-header-inner {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      min-height: 56px;
      padding-top: 10px;
      padding-bottom: 10px;
    }
    .brand {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      text-decoration: none;
    }
    .brand:hover { color: var(--accent); }
    .site-nav {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
    }
    .nav-link {
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 600;
      text-decoration: none;
      color: var(--muted);
      border: 1px solid transparent;
    }
    .nav-link:hover {
      color: var(--text);
      border-color: var(--border);
      background: rgba(255, 255, 255, 0.04);
    }
    .nav-link--current {
      color: var(--accent);
      border-color: rgba(91, 140, 255, 0.4);
      background: rgba(91, 140, 255, 0.08);
      cursor: default;
      pointer-events: none;
    }
    .nav-link--accent {
      color: var(--accent);
      border-color: rgba(91, 140, 255, 0.4);
      background: rgba(91, 140, 255, 0.08);
    }
    .nav-link--accent:hover {
      border-color: var(--accent);
      background: rgba(91, 140, 255, 0.14);
    }
    button.nav-link {
      cursor: pointer;
      font: inherit;
      font-family: inherit;
    }
    .site-main {
      flex: 1;
      padding: 20px 0 36px;
    }
    .site-footer {
      flex-shrink: 0;
      margin-top: auto;
      border-top: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.22);
      padding: 18px 0 26px;
    }
    .site-footer-inner {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }
    .footer-nav {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 16px;
    }
    .footer-nav a {
      font-size: 0.82rem;
      color: var(--muted);
      text-decoration: none;
      font-weight: 500;
    }
    .footer-nav a:hover { color: var(--accent); }
    .footer-copy {
      margin: 0;
      font-size: 0.78rem;
      color: var(--muted);
      opacity: 0.9;
    }
    .footer-copy a {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .footer-copy a:hover {
      color: var(--accent);
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .github-icon-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: 1px solid var(--border);
      color: var(--muted);
      text-decoration: none;
      transition: border-color 0.15s ease, color 0.15s ease, background 0.15s ease;
    }
    .github-icon-link:hover {
      border-color: var(--muted);
      color: var(--accent);
    }
    .hidden { display: none !important; }

    /* Login */
    .login-wrap {
      max-width: 420px;
      margin: 28px auto 0;
    }
    .login-card {
      background: linear-gradient(180deg, var(--surface) 0%, #121722 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 24px 26px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.45);
    }
    .login-card h1 {
      margin: 0 0 6px;
      font-size: 1.35rem;
      letter-spacing: -0.02em;
    }
    .login-card .sub {
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.5;
      margin: 0 0 22px;
    }
    .login-card label { display: block; font-size: 0.82rem; color: #c7d2e5; margin-bottom: 8px; }
    .login-card input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border-radius: 11px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 1rem;
    }
    .login-actions { margin-top: 18px; display: flex; flex-direction: column; gap: 12px; }
    .login-actions button.primary {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 11px;
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent2) 100%);
      color: white;
      font-weight: 650;
      font-size: 0.98rem;
      cursor: pointer;
    }
    .login-actions button.primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .remember {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.88rem;
      color: #dbe4f5;
    }
    .remember input { accent-color: var(--accent); width: auto; }
    .login-footer {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.45;
    }
    .login-footer a { color: var(--accent); }

    .btn {
      padding: 9px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font-weight: 550;
      font-size: 0.88rem;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn:hover { border-color: #3d4d63; background: rgba(255,255,255,0.04); }
    .btn-primary {
      border: none;
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent2) 100%);
      color: white;
    }
    .btn-primary:hover { filter: brightness(1.06); }

    .hint {
      color: var(--muted);
      font-size: 0.85rem;
      line-height: 1.5;
      margin: 0 0 18px;
      max-width: 720px;
    }
    .hint code { background: var(--surface2); padding: 2px 7px; border-radius: 6px; font-size: 0.84em; }

    .card {
      background: linear-gradient(180deg, var(--surface) 0%, #121722 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.25);
    }
    .card-toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 12px; }
    .msg { font-size: 0.88rem; min-height: 1.3em; margin-top: 8px; }
    .msg.ok { color: var(--ok); }
    .msg.err { color: var(--err); }

    table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
    th, td {
      text-align: left;
      padding: 12px 10px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    th {
      color: var(--muted);
      font-weight: 600;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      background: rgba(0,0,0,0.15);
    }
    tr:hover td { background: rgba(91, 140, 255, 0.04); }
    td input.edit-target {
      width: 100%;
      min-width: 180px;
      padding: 8px 10px;
      border-radius: 9px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 0.84rem;
    }
    td input.edit-target:read-only {
      background: rgba(0, 0, 0, 0.12);
      border-color: transparent;
      cursor: default;
    }
    code { background: var(--surface2); padding: 2px 7px; border-radius: 6px; font-size: 0.85em; }
    .stats { color: var(--muted); font-size: 0.8rem; white-space: nowrap; }

    .qr-cell { width: 118px; }
    .qr-cell img.qr-preview-img {
      display: block;
      border-radius: 10px;
      background: #fff;
      padding: 6px;
      width: 96px;
      height: 96px;
      object-fit: contain;
    }
    .qr-payload {
      word-break: break-all;
      margin-top: 8px;
      max-width: 200px;
      font-size: 0.72rem;
      line-height: 1.35;
      color: var(--muted);
    }
    .btn-mini {
      margin-top: 8px;
      padding: 5px 10px;
      font-size: 0.75rem;
      border-radius: 8px;
    }
    .actions-cell .btn { padding: 6px 10px; font-size: 0.78rem; margin-right: 6px; margin-bottom: 4px; }
    .table-scroll { overflow-x: auto; margin-top: 4px; border-radius: 10px; border: 1px solid var(--border); }
    .table-scroll table { margin: 0; }
    .table-scroll th:first-child, .table-scroll td:first-child { padding-left: 14px; }
    .table-scroll th:last-child, .table-scroll td:last-child { padding-right: 14px; }
  </style>
</head>
<body>
  <div class="page">
    <header class="site-header">
      <div class="shell-inner site-header-inner">
        <a class="brand" href="/">QRender</a>
        <nav class="site-nav" aria-label="Primary">
          <a class="nav-link" href="/">Generator</a>
          <span id="headerNavAdmin" class="nav-link nav-link--current" title="This page">Admin</span>
          <button type="button" class="nav-link nav-link--accent hidden" id="headerSignOut">Sign out</button>
        </nav>
      </div>
    </header>

    <main class="site-main">
    <!-- Login: same secret as server ADMIN_SECRET; sent as X-Admin-Token after sign-in -->
    <div id="loginScreen" class="login-wrap">
      <div class="login-card">
        <h1>Admin sign-in</h1>
        <p class="sub">Password matches server <code>ADMIN_SECRET</code>.</p>
        <label for="loginPassword">Password</label>
        <input id="loginPassword" type="password" autocomplete="current-password" placeholder="Admin password" />
        <div class="login-actions">
          <label class="remember">
            <input type="checkbox" id="rememberMe" />
            <span>Remember me</span>
          </label>
          <button type="button" class="primary" id="loginBtn">Sign in</button>
        </div>
        <div id="loginMsg" class="msg" aria-live="polite"></div>
      </div>
    </div>

    <div id="adminDashboard" class="hidden">
      <div class="shell-inner">
      <p class="hint"><code>PUBLIC_BASE_URL</code> in <code>.env</code> for correct short-link URLs.</p>

      <div class="card">
        <div class="card-toolbar">
          <button type="button" class="btn btn-primary" id="reloadBtn">Reload</button>
        </div>
        <div id="listMsg" class="msg"></div>
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th>QR</th>
                <th>Code</th>
                <th>Destination</th>
                <th>Hits</th>
                <th>Last scan</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
      </div>
    </div>

    </main>

    <footer class="site-footer">
      <div class="shell-inner site-footer-inner">
        <nav class="footer-nav" aria-label="Footer">
          <a href="/">Generator</a>
          <a
            class="github-icon-link footer-github"
            href="https://github.com/Benedict-CS/QRender"
            target="_blank"
            rel="noopener noreferrer"
            title="QRender on GitHub"
          >
            <span class="sr-only">QRender on GitHub</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-1.455-3.795-1.455-.51-1.305-1.245-1.65-1.245-1.65-1.005-.69.075-.675.075-.675 1.11.075 1.695 1.14 1.695 1.14 1.005 1.725 2.64 1.23 3.285.93.105-.735.39-1.23.705-1.515-2.4-.27-4.935-1.215-4.935-5.43 0-1.2.42-2.19 1.125-2.955-.12-.27-.495-1.365.105-2.85 0 0 .915-.285 3.005 1.125.87-.24 1.815-.36 2.745-.36s1.875.12 2.745.36c2.085-1.41 3-1.125 3-1.125.6 1.485.225 2.58.12 2.85.705.765 1.125 1.755 1.125 2.955 0 4.23-2.535 5.16-4.95 5.43.39.33.75.96.75 1.935 0 1.395-.015 2.52-.015 2.865 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
            </svg>
          </a>
        </nav>
        <p class="footer-copy">
          © 2026
          <a href="https://benedict.winlab.tw" target="_blank" rel="noopener noreferrer">Benedict</a>
        </p>
      </div>
    </footer>
  </div>

  <script>
    const STORAGE_SESSION = "qrender_admin_session";
    const STORAGE_PERSIST = "qrender_admin_token";
    const LEGACY_KEY = "qrender_admin_token";

    const loginScreen = document.getElementById("loginScreen");
    const adminDashboard = document.getElementById("adminDashboard");
    const loginPassword = document.getElementById("loginPassword");
    const rememberMe = document.getElementById("rememberMe");
    const loginBtn = document.getElementById("loginBtn");
    const loginMsg = document.getElementById("loginMsg");
    const headerNavAdmin = document.getElementById("headerNavAdmin");
    const headerSignOut = document.getElementById("headerSignOut");
    const listMsg = document.getElementById("listMsg");
    const tbody = document.getElementById("tbody");
    const reloadBtn = document.getElementById("reloadBtn");

    (function migrateLegacy() {
      const old = localStorage.getItem(LEGACY_KEY);
      if (old && !localStorage.getItem(STORAGE_PERSIST)) {
        localStorage.setItem(STORAGE_PERSIST, old);
        localStorage.removeItem(LEGACY_KEY);
      }
    })();

    function getToken() {
      return (
        sessionStorage.getItem(STORAGE_SESSION) ||
        localStorage.getItem(STORAGE_PERSIST) ||
        ""
      ).trim();
    }

    function setSession(secret, persist) {
      sessionStorage.removeItem(STORAGE_SESSION);
      localStorage.removeItem(STORAGE_PERSIST);
      if (persist) {
        localStorage.setItem(STORAGE_PERSIST, secret);
      } else {
        sessionStorage.setItem(STORAGE_SESSION, secret);
      }
    }

    function clearSession() {
      sessionStorage.removeItem(STORAGE_SESSION);
      localStorage.removeItem(STORAGE_PERSIST);
      localStorage.removeItem(LEGACY_KEY);
    }

    function setMsg(el, text, ok) {
      el.textContent = text || "";
      el.className = "msg " + (ok === true ? "ok" : ok === false ? "err" : "");
    }

    function showLogin() {
      loginScreen.classList.remove("hidden");
      adminDashboard.classList.add("hidden");
      loginPassword.value = "";
      if (headerNavAdmin) headerNavAdmin.classList.remove("hidden");
      if (headerSignOut) headerSignOut.classList.add("hidden");
    }

    function showDashboard() {
      loginScreen.classList.add("hidden");
      adminDashboard.classList.remove("hidden");
      if (headerNavAdmin) headerNavAdmin.classList.add("hidden");
      if (headerSignOut) headerSignOut.classList.remove("hidden");
    }

    async function api(path, opts) {
      const tok = getToken();
      const headers = Object.assign({}, opts && opts.headers);
      if (tok) headers["X-Admin-Token"] = tok;
      const r = await fetch(path, Object.assign({}, opts, { headers }));
      const txt = await r.text();
      let data = null;
      try {
        data = txt ? JSON.parse(txt) : null;
      } catch (_) {
        data = { detail: txt };
      }
      if (!r.ok) {
        const msg =
          data && data.detail
            ? Array.isArray(data.detail)
              ? data.detail.map((d) => d.msg).join("; ")
              : data.detail
            : "HTTP " + r.status;
        throw new Error(msg);
      }
      return data;
    }

    async function tryResume() {
      const t = getToken();
      if (!t) {
        showLogin();
        return;
      }
      try {
        await api("/api/admin/config");
        showDashboard();
        loadList();
      } catch (_) {
        clearSession();
        showLogin();
        setMsg(loginMsg, "Sign in again (invalid or outdated token).", false);
      }
    }

    loginBtn.addEventListener("click", async () => {
      const pwd = loginPassword.value.trim();
      if (!pwd) {
        setMsg(loginMsg, "Enter password.", false);
        return;
      }
      loginBtn.disabled = true;
      setMsg(loginMsg, "Checking…", null);
      try {
        const r = await fetch("/api/admin/config", {
          headers: { "X-Admin-Token": pwd },
        });
        const txt = await r.text();
        if (!r.ok) {
          let detail = txt;
          try {
            const j = JSON.parse(txt);
            detail = j.detail || txt;
          } catch (_) {}
          throw new Error(typeof detail === "string" ? detail : "Unauthorized");
        }
        setSession(pwd, rememberMe.checked);
        setMsg(loginMsg, "", null);
        showDashboard();
        loadList();
      } catch (e) {
        setMsg(loginMsg, e.message || String(e), false);
      } finally {
        loginBtn.disabled = false;
      }
    });

    loginPassword.addEventListener("keydown", (e) => {
      if (e.key === "Enter") loginBtn.click();
    });

    if (headerSignOut) {
      headerSignOut.addEventListener("click", () => {
        clearSession();
        tbody.innerHTML = "";
        showLogin();
        setMsg(loginMsg, "Signed out", true);
      });
    }

    function fmtTs(ts) {
      if (ts == null || ts === "") return "—";
      const d = new Date(ts * 1000);
      return isNaN(d.getTime()) ? "—" : d.toLocaleString();
    }

    function exitAllEditModes(exceptTr) {
      tbody.querySelectorAll("tr[data-editing='1']").forEach((tr) => {
        if (exceptTr && tr === exceptTr) return;
        setRowEditing(tr, false);
      });
    }

    function setRowEditing(tr, editing) {
      const inp = tr.querySelector("input.edit-target");
      if (!inp) return;
      const editBtn = tr.querySelector(".edit-row");
      const saveBtn = tr.querySelector(".save-row");
      const cancelBtn = tr.querySelector(".cancel-edit");
      if (!editBtn || !saveBtn || !cancelBtn) return;
      if (editing) {
        exitAllEditModes(tr);
        inp.readOnly = false;
        tr.dataset.editing = "1";
        editBtn.classList.add("hidden");
        saveBtn.classList.remove("hidden");
        cancelBtn.classList.remove("hidden");
        requestAnimationFrame(() => inp.focus());
      } else {
        inp.readOnly = true;
        inp.value = inp.dataset.originalTarget || "";
        delete tr.dataset.editing;
        editBtn.classList.remove("hidden");
        saveBtn.classList.add("hidden");
        cancelBtn.classList.add("hidden");
      }
    }

    function row(link, payloadFull) {
      const tr = document.createElement("tr");

      const tdQr = document.createElement("td");
      tdQr.className = "qr-cell";
      const qrImg = document.createElement("img");
      qrImg.className = "qr-preview-img";
      qrImg.alt = "Loading…";
      qrImg.dataset.code = link.code;
      tdQr.appendChild(qrImg);
      const cap = document.createElement("div");
      cap.className = "qr-payload";
      cap.textContent = payloadFull;
      tdQr.appendChild(cap);
      const copyBtn = document.createElement("button");
      copyBtn.type = "button";
      copyBtn.className = "btn btn-mini copy-payload";
      copyBtn.textContent = "Copy URL";
      copyBtn.dataset.copy = payloadFull;
      tdQr.appendChild(copyBtn);

      const shortPath = "/s/" + link.code;

      const tdCode = document.createElement("td");
      const codeEl = document.createElement("code");
      codeEl.textContent = link.code;
      tdCode.appendChild(codeEl);
      const divLink = document.createElement("div");
      divLink.className = "stats";
      const a = document.createElement("a");
      a.href = shortPath;
      a.target = "_blank";
      a.rel = "noopener";
      a.textContent = shortPath;
      divLink.appendChild(a);
      tdCode.appendChild(divLink);

      const tdTarget = document.createElement("td");
      const inp = document.createElement("input");
      inp.className = "edit-target";
      inp.type = "text";
      inp.readOnly = true;
      inp.dataset.code = link.code;
      inp.dataset.originalTarget = link.target || "";
      inp.value = link.target || "";

      const tdHits = document.createElement("td");
      tdHits.className = "stats";
      tdHits.textContent = String(link.hit_count || 0);

      const tdLast = document.createElement("td");
      tdLast.className = "stats";
      tdLast.textContent = fmtTs(link.last_hit_at);

      const tdAct = document.createElement("td");
      tdAct.className = "actions-cell";
      const bEdit = document.createElement("button");
      bEdit.type = "button";
      bEdit.className = "btn edit-row";
      bEdit.dataset.code = link.code;
      bEdit.textContent = "Edit";
      const bSave = document.createElement("button");
      bSave.type = "button";
      bSave.className = "btn btn-primary save-row hidden";
      bSave.dataset.code = link.code;
      bSave.textContent = "Save";
      const bCancel = document.createElement("button");
      bCancel.type = "button";
      bCancel.className = "btn cancel-edit hidden";
      bCancel.dataset.code = link.code;
      bCancel.textContent = "Cancel";
      const bDel = document.createElement("button");
      bDel.type = "button";
      bDel.className = "btn del-row";
      bDel.dataset.code = link.code;
      bDel.textContent = "Delete";
      tdAct.appendChild(bEdit);
      tdAct.appendChild(bSave);
      tdAct.appendChild(bCancel);
      tdAct.appendChild(bDel);

      tr.appendChild(tdQr);
      tr.appendChild(tdCode);
      tdTarget.appendChild(inp);
      tr.appendChild(tdTarget);
      tr.appendChild(tdHits);
      tr.appendChild(tdLast);
      tr.appendChild(tdAct);
      return tr;
    }

    function revokeQrBlobUrls() {
      tbody.querySelectorAll("img.qr-preview-img").forEach((img) => {
        if (img.src && img.src.startsWith("blob:")) URL.revokeObjectURL(img.src);
      });
    }

    async function fillQrPreviewImages() {
      const tok = getToken();
      const imgs = tbody.querySelectorAll("img.qr-preview-img");
      for (const img of imgs) {
        const code = img.dataset.code;
        if (!code || !tok) continue;
        try {
          let r = await fetch("/api/admin/links/" + encodeURIComponent(code) + "/art.png", {
            headers: { "X-Admin-Token": tok },
          });
          if (!r.ok) {
            r = await fetch("/api/admin/links/" + encodeURIComponent(code) + "/qr.png", {
              headers: { "X-Admin-Token": tok },
            });
          }
          if (!r.ok) {
            img.alt = "—";
            continue;
          }
          const blob = await r.blob();
          img.src = URL.createObjectURL(blob);
          img.alt = "QR";
        } catch (_) {
          img.alt = "—";
        }
      }
    }

    async function loadList() {
      reloadBtn.disabled = true;
      reloadBtn.setAttribute("aria-busy", "true");
      try {
        revokeQrBlobUrls();
        setMsg(listMsg, "Loading…", null);
        tbody.innerHTML = "";
        try {
          const cfg = await api("/api/admin/config");
          const base =
            cfg && cfg.public_base_url ? String(cfg.public_base_url).replace(/\/$/, "") : "";
          const links = await api("/api/admin/links");
          if (!links.length) {
            setMsg(
              listMsg,
              "No links yet. Generator: Short link + Save — Manage in Admin, then Generate.",
              null,
            );
            return;
          }
          setMsg(listMsg, "", null);
          links.forEach((l) => {
            const payloadFull = base + "/s/" + l.code;
            tbody.appendChild(row(l, payloadFull));
          });
          await fillQrPreviewImages();
        } catch (e) {
          if ((e.message || "").includes("403") || (e.message || "").toLowerCase().includes("invalid")) {
            clearSession();
            showLogin();
            setMsg(
            loginMsg,
            "Sign in again (invalid or outdated token).",
            false,
          );
            return;
          }
          setMsg(listMsg, e.message || String(e), false);
        }
      } finally {
        reloadBtn.disabled = false;
        reloadBtn.removeAttribute("aria-busy");
      }
    }

    tbody.addEventListener("click", async (e) => {
      const t = e.target;
      const copySrc = t.closest("[data-copy]");
      if (copySrc && copySrc.getAttribute("data-copy")) {
        try {
          await navigator.clipboard.writeText(copySrc.getAttribute("data-copy") || "");
          setMsg(listMsg, "Copied to clipboard.", true);
        } catch (_) {
          setMsg(listMsg, "Clipboard failed.", false);
        }
        return;
      }
      if (t.classList.contains("edit-row")) {
        const tr = t.closest("tr");
        if (tr) setRowEditing(tr, true);
        return;
      }
      if (t.classList.contains("cancel-edit")) {
        const tr = t.closest("tr");
        if (tr) setRowEditing(tr, false);
        return;
      }
      if (t.classList.contains("save-row")) {
        const code = t.getAttribute("data-code");
        const inp = tbody.querySelector('input.edit-target[data-code="' + code + '"]');
        if (!inp) return;
        try {
          await api("/api/admin/links/" + encodeURIComponent(code), {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ target: inp.value.trim() }),
          });
          setMsg(listMsg, "Updated " + code + ".", true);
          loadList();
        } catch (err) {
          setMsg(listMsg, err.message || String(err), false);
        }
        return;
      }
      if (t.classList.contains("del-row")) {
        const code = t.getAttribute("data-code");
        if (!confirm("Delete /s/" + code + " permanently?")) return;
        try {
          await api("/api/admin/links/" + encodeURIComponent(code), { method: "DELETE" });
          setMsg(listMsg, "Deleted " + code + ".", true);
          loadList();
        } catch (err) {
          setMsg(listMsg, err.message || String(err), false);
        }
        return;
      }
    });

    reloadBtn.addEventListener("click", loadList);

    tbody.addEventListener("keydown", (e) => {
      if (e.key !== "Escape") return;
      const inp = e.target;
      if (!inp || !inp.classList.contains("edit-target")) return;
      const tr = inp.closest("tr");
      if (tr && tr.dataset.editing === "1") {
        e.preventDefault();
        setRowEditing(tr, false);
      }
    });

    tryResume().finally(() => {
      if (!loginScreen.classList.contains("hidden")) {
        loginPassword.focus();
      }
    });
  </script>
</body>
</html>
